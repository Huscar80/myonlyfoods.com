<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | myonlyfoods</title>
    <style>
        :root {
            --logo-cream: #f8f6f1; 
            --primary-green: #2e5a35;
            --white: #ffffff;
            --text-dark: #333;
            --gray-border: #e1e1e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--logo-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed to min-height for better scrolling on mobile */
        }

        .login-card {
            background: var(--logo-cream);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02); /* Very subtle edge */
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo-img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            color: var(--primary-green);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--white);
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            box-sizing: border-box; 
            font-size: 1rem;
        }

        /* BRINGING THE BUTTON BACK TO LIFE */
        .login-btn {
            display: block; /* Ensures it takes up space */
            width: 100%;
            padding: 14px;
            background-color: var(--primary-green) !important; /* Force the green color */
            color: white !important;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s, opacity 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #888;
        }

        .footer-links a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="images/mainlogo.jpg" alt="myonlyfoods logo" class="logo-img">
        </div>
        
        <h1>Welcome Back</h1>
        <p>Log in to your personal culinary portal.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-links">
            <a href="forgot-password.html">Forgot Password?</a>
            <span style="margin: 0 8px;">•</span>
            <a href="signup.html">Create account</a>
        </div>
    </div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // PASTE YOUR DATA FROM THE SCREENSHOT HERE:
  const firebaseConfig = {
  apiKey: "AIzaSyBKgYfFzvjy47pmIK_G1D9yon8NjjX5lmI",
  authDomain: "myonlyfoods-e9ee8.firebaseapp.com",
  projectId: "myonlyfoods-e9ee8",
  storageBucket: "myonlyfoods-e9ee8.firebasestorage.app",
  messagingSenderId: "790098672248",
  appId: "1:790098672248:web:cdac6a3911a7ba82860b8d",  
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // The Login Logic
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        window.location.href = "dashboard.html";
      })
      .catch((error) => {
        alert("Login failed: " + error.message);
      });
  });
    </script>

</body>
</html>
