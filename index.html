<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myonlyfoods | Coming Soon</title>
    <style>
        :root {
            --primary-green: #2e5a35; /* Professional forest green */
            --white: #ffffff;
            --light-gray: #f4f4f4;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--white);
            color: var(--primary-green);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 30px;
            /* Placeholder styling if image is missing */
            border-radius: 15px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 40px;
        }

        .cta-button {
            background-color: var(--primary-green);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .cta-button:hover {
            opacity: 0.9;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="mainlogo.jpg" alt="myonlyfoods logo" class="logo">

        <h1>Coming Soon</h1>
        <p>Your personal culinary experience is being prepared. <br> 
        Stay tuned for the launch of <strong>myonlyfoods</strong>.</p>

        <a href="mailto:hello@myonlyfoods.com" class="cta-button">Get Notified</a>
    </div>

    <div class="footer">
        &copy; 2026 myonlyfoods. All rights reserved.
    </div>

        <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            // This is where we tell the browser to go to the dashboard
            window.location.href = "dashboard.html"; 
        });
    </script>

</body>
</html>
