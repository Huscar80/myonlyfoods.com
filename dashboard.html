<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKgYfFzvjy47pmIK_G1D9yon8NjjX5lmI",
        authDomain: "myonlyfoods-e9ee8.firebaseapp.com",
        projectId: "myonlyfoods-e9ee8",
        storageBucket: "myonlyfoods-e9ee8.firebasestorage.app",
        messagingSenderId: "790098672248",
        appId: "1:790098672248:web:cdac6a3911a7ba82860b8d",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let cropper;
    let selectedDay = ""; 

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // --- 1. PROFILE DATA LISTENER ---
            onSnapshot(doc(db, "profiles", user.uid), (docSnap) => {
                const data = docSnap.data() || {};
                const chefName = data.name || "Chef";
                document.getElementById('header-greeting').innerText = `Hello, ${chefName}`;
                document.getElementById('display-name').innerText = chefName;
                document.getElementById('display-location').innerText = data.location || "Not set";
                document.getElementById('display-fav-food').innerText = data.favFood || "Not set";
                document.getElementById('display-fav-restaurant').innerText = data.favRestaurant || "Not set";

                const avatar = document.getElementById('avatar-container');
                if (data.photoURL) {
                    avatar.innerHTML = `<img src="${data.photoURL}?t=${new Date().getTime()}" style="width:100%; height:100%; object-fit:cover;">`;
                } else {
                    const initial = chefName.charAt(0).toUpperCase();
                    avatar.innerHTML = `<span id="profile-initials" style="font-size: 3rem; color: #999;">${initial}</span>`;
                }
                document.getElementById('edit-name').value = data.name || "";
                document.getElementById('edit-location').value = data.location || "";
                document.getElementById('edit-fav-food').value = data.favFood || "";
                document.getElementById('edit-fav-restaurant').value = data.favRestaurant || "";
            });

            // --- 2. RECIPE LISTENER ---
            onSnapshot(collection(db, "profiles", user.uid, "recipes"), (snap) => {
                const list = document.getElementById('recipe-list');
                if (snap.empty) {
                    list.innerHTML = `<p style="color:#888;">Your cookbook is empty. Add your masterpiece!</p>`;
                    return;
                }
                list.innerHTML = snap.docs.map(doc => {
                    const recipe = doc.data();
                    const recipeId = doc.id;
                    const subTag = recipe.subCategory && recipe.subCategory !== 'None' ? recipe.subCategory : '';
                    return `
                        <div class="stat-card" style="border-left: 5px solid var(--primary-green); padding: 15px; margin-bottom:10px;">
                            <div style="font-size: 0.7rem; font-weight: bold; color: var(--primary-green); text-transform: uppercase;">${recipe.category}</div>
                            <div style="font-size: 0.65rem; font-weight: bold; color: var(--accent-gold); text-transform: uppercase;">${subTag}</div>
                            <h4 style="margin: 5px 0;">${recipe.title}</h4>
                            <div style="display:flex; gap:10px;">
                                <button onclick="viewRecipe('${recipeId}')" class="btn-action" style="padding: 5px 10px; font-size: 0.7rem; margin-top:5px;">View</button>
                                <button onclick="deleteRecipe('${recipeId}')" class="btn-action" style="padding: 5px 10px; font-size: 0.7rem; margin-top:5px; background:#ffbaba; color:#a00;">Delete</button>
                            </div>
                        </div>
                    `;
                }).join('');
            });

            // --- 3. PROFILE SAVE ---
            document.getElementById('save-profile-btn').onclick = async () => {
                const saveBtn = document.getElementById('save-profile-btn');
                saveBtn.innerText = "Processing...";
                saveBtn.disabled = true;
                try {
                    const profileData = {
                        name: document.getElementById('edit-name').value,
                        location: document.getElementById('edit-location').value,
                        favFood: document.getElementById('edit-fav-food').value,
                        favRestaurant: document.getElementById('edit-fav-restaurant').value,
                        updatedAt: new Date()
                    };
                    if (cropper) {
                        const canvas = cropper.getCroppedCanvas({ width: 200, height: 200 });
                        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                        const storageRef = ref(storage, `profile_pics/${user.uid}`);
                        await uploadBytes(storageRef, blob);
                        profileData.photoURL = await getDownloadURL(storageRef);
                    }
                    await setDoc(doc(db, "profiles", user.uid), profileData, { merge: true });
                    toggleEdit(false);
                    showToast("Profile Updated!");
                } catch (e) { alert("Error: " + e.message); }
                finally { saveBtn.innerText = "Save Changes"; saveBtn.disabled = false; }
            };

            // --- 4. RECIPE SAVE ---
            document.getElementById('save-recipe-btn').onclick = async () => {
                const btn = document.getElementById('save-recipe-btn');
                btn.innerText = "Saving...";
                btn.disabled = true;
                try {
                    const recipeData = {
                        title: document.getElementById('recipe-title').value,
                        category: document.getElementById('recipe-category').value,
                        subCategory: document.getElementById('recipe-subcategory').value,
                        ingredients: document.getElementById('recipe-ingredients').value.split('\n').filter(i => i.trim() !== ""),
                        instructions: document.getElementById('recipe-instructions').value,
                        createdAt: new Date()
                    };
                    await addDoc(collection(db, "profiles", user.uid, "recipes"), recipeData);
                    closeRecipeModal();
                    document.getElementById('recipe-title').value = "";
                    document.getElementById('recipe-ingredients').value = "";
                    document.getElementById('recipe-instructions').value = "";
                } catch (e) { alert("Error: " + e.message); }
                finally { btn.innerText = "Save to Cookbook"; btn.disabled = false; }
            };

        } else { window.location.href = "index.html"; }
    });

    // --- GLOBAL HELPERS ---
    window.toggleEdit = (isEditing) => {
        document.getElementById('profile-view').style.display = isEditing ? 'none' : 'block';
        document.getElementById('profile-edit').style.display = isEditing ? 'block' : 'none';
    };

    window.showSection = (sectionId) => {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(`section-${sectionId}`).style.display = 'block';
    };

    window.showPantrySub = (subId) => {
        document.getElementById('sub-menu-plan').style.display = subId === 'menu-plan' ? 'block' : 'none';
        document.getElementById('sub-shopping-list').style.display = subId === 'shopping-list' ? 'block' : 'none';
    };

    window.openRecipeModal = () => document.getElementById('recipe-modal').style.display = 'flex';
    window.closeRecipeModal = () => document.getElementById('recipe-modal').style.display = 'none';

    window.deleteRecipe = async (recipeId) => {
        if (confirm("Delete this masterpiece?")) {
            await deleteDoc(doc(db, "profiles", auth.currentUser.uid, "recipes", recipeId));
        }
    };

    window.viewRecipe = async (recipeId) => {
        const docRef = doc(db, "profiles", auth.currentUser.uid, "recipes", recipeId);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const recipe = docSnap.data();
            document.getElementById('view-recipe-title').innerText = recipe.title;
            document.getElementById('view-recipe-tags').innerText = `${recipe.category} • ${recipe.subCategory}`;
            document.getElementById('view-recipe-instructions').innerText = recipe.instructions;
            document.getElementById('view-recipe-ingredients').innerHTML = recipe.ingredients.map(ing => `<li>${ing}</li>`).join('');
            document.getElementById('view-recipe-modal').style.display = 'flex';
        }
    };

    window.closeViewModal = () => document.getElementById('view-recipe-modal').style.display = 'none';

    // --- MENU PLAN LOGIC ---
    window.openMealPicker = async (day) => {
        selectedDay = day.toLowerCase();
        document.getElementById('picker-day-title').innerText = `Assign Meal for ${day}`;
        const list = document.getElementById('picker-recipe-list');
        list.innerHTML = "Loading...";
        const snap = await getDocs(collection(db, "profiles", auth.currentUser.uid, "recipes"));
        if (snap.empty) {
            list.innerHTML = "No recipes found.";
        } else {
            list.innerHTML = snap.docs.map(doc => `
                <div onclick="assignMeal('${doc.data().title.replace(/'/g, "\\'")}')" style="padding:12px; border-bottom:1px solid #eee; cursor:pointer; font-weight:bold; color:var(--primary-green);">
                    ${doc.data().title}
                </div>
            `).join('');
        }
        document.getElementById('meal-picker-modal').style.display = 'flex';
    };

    window.assignMeal = (title) => {
        const slot = document.getElementById(`meal-${selectedDay}`);
        slot.innerHTML = `<strong style="color:var(--primary-green);">${title}</strong>`;
        document.getElementById('meal-picker-modal').style.display = 'none';
    };

    // UI Initialization
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    document.getElementById('weekly-grid').innerHTML = days.map(day => `
        <div class="day-card" style="background:white; padding:15px; border-radius:12px; border: 1px solid #eee;">
            <h4 style="margin:0 0 10px 0; color:var(--primary-green);">${day}</h4>
            <div id="meal-${day.toLowerCase()}" style="min-height: 40px; font-size:0.8rem; color:#888;">No meal planned</div>
            <button onclick="openMealPicker('${day}')" class="btn-action" style="width: 100%; font-size: 0.7rem; padding: 5px;">+ Assign</button>
        </div>
    `).join('');

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.className = "show";
        setTimeout(() => { t.className = ""; }, 3000);
    }

    document.getElementById('logout-btn').onclick = () => signOut(auth);
    document.getElementById('profile-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('cropper-image').src = ev.target.result;
                document.getElementById('cropper-modal').style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('cropper-image'), { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(file);
        }
    };
    document.getElementById('crop-done-btn').onclick = () => document.getElementById('cropper-modal').style.display = 'none';
</script>
