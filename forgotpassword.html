<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | myonlyfoods</title>
    <style>
        :root {
            --logo-cream: #f8f6f1; 
            --primary-green: #2e5a35;
            --white: #ffffff;
            --text-dark: #333;
            --gray-border: #e1e1e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--logo-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--logo-cream);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 { color: var(--primary-green); font-size: 1.8rem; margin-bottom: 8px; }
        p { color: #555; margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { text-align: left; margin-bottom: 15px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--white);
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            box-sizing: border-box; 
            font-size: 1rem;
        }

        .reset-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .reset-btn:hover { opacity: 0.9; }

        .footer-links { margin-top: 25px; font-size: 0.85rem; color: #888; }
        .footer-links a { color: var(--primary-green); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Reset Password</h1>
        <p>Enter your email and we'll send you a link to get back into your kitchen.</p>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>

            <button type="submit" class="reset-btn">Send Reset Link</button>
        </form>

        <div class="footer-links">
            <a href="index.html">Back to Sign In</a>
        </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKgYfFzvjy47pmIK_G1D9yon8NjjX5lmI",
    authDomain: "myonlyfoods-e9ee8.firebaseapp.com",
    projectId: "myonlyfoods-e9ee8",
    storageBucket: "myonlyfoods-e9ee8.firebasestorage.app",
    messagingSenderId: "790098672248",
    appId: "1:790098672248:web:cdac6a3911a7ba82860b8d",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('resetForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;

    sendPasswordResetEmail(auth, email)
      .then(() => {
        alert("Success! Check your inbox for the reset link.");
        window.location.href = "index.html";
      })
      .catch((error) => {
        alert("Error: " + error.message);
      });
  });
</script>

</body>
</html>
