<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | myonlyfoods</title>
    <style>
        :root {
            --logo-cream: #f8f6f1; 
            --primary-green: #2e5a35;
            --white: #ffffff;
            --text-dark: #333;
            --gray-border: #e1e1e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--logo-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--logo-cream);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo-container { margin-bottom: 25px; }
        .logo-img { max-width: 150px; height: auto; }

        h1 { color: var(--primary-green); font-size: 1.8rem; margin-bottom: 8px; }
        p { color: #555; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 15px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--white);
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            box-sizing: border-box; 
            font-size: 1rem;
        }

        .login-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        .login-btn:hover { opacity: 0.9; }

        .footer-links { margin-top: 25px; font-size: 0.85rem; color: #888; }
        .footer-links a { color: var(--primary-green); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="images/mainlogo.jpg" alt="myonlyfoods logo" class="logo-img">
        </div>
        
        <h1>Join the Table</h1>
        <p>Create your account to start your culinary journey.</p>

        <form id="signupForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Chef Name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Create Account</button>
        </form>

        <div class="footer-links">
            <span>Already have an account?</span> 
            <a href="index.html">Sign In</a>
        </div>
    </div>

<script type="module">
  // 1. Added 'updateProfile' to the import list
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBKgYfFzvjy47pmIK_G1D9yon8NjjX5lmI",
  authDomain: "myonlyfoods-e9ee8.firebaseapp.com",
  projectId: "myonlyfoods-e9ee8",
  storageBucket: "myonlyfoods-e9ee8.firebasestorage.app",
  messagingSenderId: "790098672248",
  appId: "1:790098672248:web:cdac6a3911a7ba82860b8d",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();

    // Get the name from your "Full Name" input field
    const fullName = document.getElementById('fullname').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        // 2. NEW STEP: Attach the name to the user's profile
        updateProfile(userCredential.user, {
          displayName: fullName
        }).then(() => {
          alert("Profile Created, Chef " + fullName + "!");
          window.location.href = "dashboard.html";
        });
      })
      .catch((error) => {
        alert("Signup Error: " + error.message);
      });
  });
</script>


</body>
</html>
